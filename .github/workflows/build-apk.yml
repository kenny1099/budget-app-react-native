name: Build Android APK

on:

  push:

    branches: [main]

  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo

        uses: actions/checkout@v4

      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: 20

          cache: npm

      - name: Setup Expo

        uses: expo/expo-github-action@v8

        with:

          expo-version: latest

          eas-version: latest

          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies

        run: npm ci

      - name: Build APK

        run: eas build --platform android --profile preview --non-interactive

      - name: Download APK

        run: |

          URL=$(eas build:list --platform android --limit 1 --json --non-interactive | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d)[0].artifacts.buildUrl)")

          curl -L "$URL" -o budget-plus.apk

      - name: Upload APK artifact

        uses: actions/upload-artifact@v4

        with:

          name: budget-plus-apk

          path: budget-plus.apk

          retention-days: 7
